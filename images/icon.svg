<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="18" fill="url(#bg)"/>

  <!-- Browser window body -->
  <rect x="14" y="30" width="100" height="70" rx="7" fill="white" fill-opacity="0.12"/>

  <!-- Title bar -->
  <rect x="14" y="30" width="100" height="22" rx="7" fill="white" fill-opacity="0.2"/>
  <rect x="14" y="42" width="100" height="10" fill="white" fill-opacity="0.2"/>

  <!-- Window controls -->
  <circle cx="29" cy="41" r="4.5" fill="#FF5F57"/>
  <circle cx="43" cy="41" r="4.5" fill="#FEBC2E"/>
  <circle cx="57" cy="41" r="4.5" fill="#28C840"/>

  <!-- Address bar -->
  <rect x="66" y="33" width="42" height="15" rx="7" fill="white" fill-opacity="0.2"/>

  <!-- Globe (web) -->
  <circle cx="56" cy="78" r="20" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.9"/>
  <ellipse cx="56" cy="78" rx="10" ry="20" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="36" y1="72" x2="76" y2="72" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="36" y1="84" x2="76" y2="84" stroke="white" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Launch arrow (top-right, yellow) -->
  <line x1="88" y1="90" x2="110" y2="60" stroke="#FEBC2E" stroke-width="5" stroke-linecap="round"/>
  <polyline points="94,58 110,58 110,74" fill="none" stroke="#FEBC2E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
